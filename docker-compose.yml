# Starts the PostgreSQL database for the app.
# Usage:  docker compose up -d     (start, keeps running in background)
#         docker compose down      (stop)
# Data persists in a named volume between restarts.
services:
  db:
    image: postgres:16
    container_name: weekly-reports-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: weekly_reports
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d weekly_reports"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db-data:
